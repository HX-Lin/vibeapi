# 限流配置（按真实客户端 IP）
limit_req_zone $binary_remote_addr zone=web:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=200r/s;
limit_req_status 429;

# WebSocket/SSE 支持
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# 与 vibeapi 的 keepalive 连接池
upstream vibeapi_backend {
    server vibeapi:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name vibe-api.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vibe-api.com;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # SSL
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;

    # 请求体
    client_max_body_size 100M;
    client_body_buffer_size 10M;

    # 真实 IP 透传（Docker 网络）
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Real-IP;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 自定义错误返回（API 友好的 JSON 格式）
    error_page 502 /custom_502;
    error_page 503 /custom_503;
    error_page 504 /custom_504;
    error_page 429 /custom_429;

    location = /custom_502 {
        internal;
        default_type application/json;
        return 502 '{"error":{"message":"Bad Gateway","type":"server_error","code":502}}';
    }
    location = /custom_503 {
        internal;
        default_type application/json;
        return 503 '{"error":{"message":"Service Unavailable","type":"server_error","code":503}}';
    }
    location = /custom_504 {
        internal;
        default_type application/json;
        return 504 '{"error":{"message":"Gateway Timeout","type":"server_error","code":504}}';
    }
    location = /custom_429 {
        internal;
        default_type application/json;
        return 429 '{"error":{"message":"Too Many Requests","type":"rate_limit_error","code":429}}';
    }

    # 拦截恶意扫描（直接断开连接，不返回任何内容）
    location ~* (wordpress|wp-admin|wp-login|\.php$|\.asp$|\.aspx$|\.env$|\.git|cgi-bin|\.sql$) {
        return 444;
    }

    # 静态资源长缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        limit_req zone=web burst=50 nodelay;
        proxy_pass http://vibeapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 主服务
    location / {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://vibeapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }
}
