# VibeAPI cloud deployment configuration
#
# PostgreSQL and Redis are intentionally externalized. Configure .env with
# Alibaba Cloud RDS PostgreSQL and Tair/Redis endpoints before starting.

services:
  vibeapi:
    image: ghcr.io/hx-lin/vibeapi:latest
    container_name: vibeapi
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: --log-dir /app/logs
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - /etc/letsencrypt/live/vibe-api.com/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/vibe-api.com/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - /etc/letsencrypt/archive/vibe-api.com:/etc/letsencrypt/archive/vibe-api.com:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vibeapi
