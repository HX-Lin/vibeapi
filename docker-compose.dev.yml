# Frontend Development - Backend built from local source, using external cloud PostgreSQL and Redis/Tair
#
# Usage:
#   1. Copy .env.example to .env and configure SQL_DSN plus REDIS_*.
#   2. docker compose -f docker-compose.dev.yml up -d
#   3. cd web && bun install && bun run dev
#   4. Open http://localhost:3001 (Rsbuild dev server, API auto-proxied to :3000)
#
# Rebuild backend after Go code changes:
#   docker compose -f docker-compose.dev.yml up -d --build new-api
#
# Stop:
#   docker compose -f docker-compose.dev.yml down

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: new-api-dev:local
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - dev_data:/data
    env_file: .env
    environment:
      - TZ=Asia/Shanghai
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-dev-node-1
    networks:
      - dev-network

volumes:
  dev_data:

networks:
  dev-network:
    driver: bridge
