# VibeAPI cloud-oriented Docker Compose configuration
#
# This compose file runs only the application container. PostgreSQL and Redis
# should be provided by cloud services such as Alibaba Cloud RDS PostgreSQL and
# Tair/Redis. Copy .env.example to .env and configure SQL_DSN plus REDIS_*.

version: '3.4'

services:
  vibeapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: vibeapi:latest
    container_name: vibeapi
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    env_file: .env
    environment:
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - SYNC_FREQUENCY=60
      - NODE_NAME=new-api-node-1
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
