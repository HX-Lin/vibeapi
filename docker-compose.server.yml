# VibeAPI server deployment with external cloud PostgreSQL and Redis/Tair
#
# Usage:
#   1. Copy this file, .env, and nginx.conf to the server.
#   2. Configure .env with Alibaba Cloud RDS PostgreSQL SQL_DSN and Tair/Redis REDIS_* settings.
#   3. docker compose -f docker-compose.server.yml up -d
#
# Multi-node deployment:
#   - Use the same SQL_DSN, REDIS_* and SESSION_SECRET on every node.
#   - Keep one node as NODE_TYPE=master; set other nodes to NODE_TYPE=slave.

services:
  vibeapi:
    image: ghcr.io/hx-lin/vibeapi:latest
    container_name: vibeapi
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: --log-dir /app/logs
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - /etc/letsencrypt/live/vibe-api.com/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/vibe-api.com/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vibeapi
