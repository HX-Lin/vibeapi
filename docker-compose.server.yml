# VibeAPI Server Deployment (Let's Encrypt SSL)
#
# Prerequisites:
#   1. certbot certonly --standalone -d vibe-api.com
#   2. Certificate will be at /etc/letsencrypt/live/vibe-api.com/
#
# Usage:
#   1. Copy this file, .env, and nginx.conf to the server
#   2. Edit .env file: change DB_PASSWORD and SESSION_SECRET
#   3. docker compose -f docker-compose.server.yml up -d
#
# Update to latest version:
#   docker compose -f docker-compose.server.yml pull vibeapi
#   docker compose -f docker-compose.server.yml up -d
#
# Certificate renewal (auto via crontab):
#   certbot renew --pre-hook "docker compose -f /opt/vibeapi/docker-compose.server.yml stop nginx" --post-hook "docker compose -f /opt/vibeapi/docker-compose.server.yml start nginx"
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN in .env
#   2. Uncomment the mysql service and SQL_DSN in .env
#   3. Uncomment mysql in depends_on
#   4. Uncomment mysql_data in volumes section

services:
  vibeapi:
    image: ghcr.io/hx-lin/vibeapi:latest
    container_name: vibeapi
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: --log-dir /app/logs
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    env_file: .env
    depends_on:
      - redis
      - postgres
#      - mysql
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - /etc/letsencrypt/live/vibe-api.com/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/vibe-api.com/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vibeapi

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: vibeapi
    volumes:
      - pg_data:/var/lib/postgresql/data

#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
#      MYSQL_DATABASE: vibeapi
#    volumes:
#      - mysql_data:/var/lib/mysql

volumes:
  pg_data:
