# VibeAPI Server Deployment
#
# Usage:
#   1. Copy this file to the server
#   2. Edit passwords and SESSION_SECRET below
#   3. docker compose -f docker-compose.server.yml up -d
#
# Update to latest version:
#   docker compose -f docker-compose.server.yml pull vibeapi
#   docker compose -f docker-compose.server.yml up -d
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line
#   2. Uncomment the mysql service and SQL_DSN line
#   3. Uncomment mysql in depends_on
#   4. Uncomment mysql_data in volumes section

services:
  vibeapi:
    image: ghcr.io/hx-lin/vibeapi:latest
    container_name: vibeapi
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:CHANGE_ME@postgres:5432/new-api
#      - SQL_DSN=root:CHANGE_ME@tcp(mysql:3306)/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - SESSION_SECRET=CHANGE_ME_TO_RANDOM_STRING
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - SYNC_FREQUENCY=60
    depends_on:
      - redis
      - postgres
#      - mysql
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data

#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: CHANGE_ME
#      MYSQL_DATABASE: new-api
#    volumes:
#      - mysql_data:/var/lib/mysql

volumes:
  pg_data:
